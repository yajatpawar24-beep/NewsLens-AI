[pytest]
# Pytest configuration for NewsLens AI

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component workflows
    slow: Tests that take longer to run
    requires_api: Tests that require API credentials
    requires_data: Tests that require sample data

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=agents --cov=api --cov-report=html --cov-report=term
